name = "yairb-pa-api"
main = "src/index.ts"
compatibility_date = "2026-03-05"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[vars]
PA_API_PORT = "8788"
PA_ADMIN_USER = "admin"
PA_LLM_PROVIDER = "openai"
OPENAI_MODEL = "gpt-4.1-nano"
PA_LOG_LLM_TEXT = "1"
PA_LOG_CONSOLE_MAX = "20000"
SUPABASE_URL = "https://ljblpufziablobrhtpfz.supabase.co"

[ai]
binding = "AI"

# Secrets (set via `wrangler secret put`):
# - SUPABASE_SECRET_KEY
# - OPENAI_API_KEY (optional)
# - GOOGLE_TTS_API_KEY (optional, for TTS fallback on mobile)
