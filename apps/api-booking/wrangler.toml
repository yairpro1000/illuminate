name = "illuminate"
main = "src/index.ts"
compatibility_date = "2024-09-23"
workers_dev = true
preview_urls = true

routes = [
  { pattern = "letsilluminate.co/api/*", zone_name = "letsilluminate.co" },
  { pattern = "api.letsilluminate.co", zone_name = "letsilluminate.co", custom_domain = true }
]

[vars]
# Dev-stage architecture: all externally sensitive providers stay explicitly mock-first
# unless intentionally overridden for a focused integration test.
REPOSITORY_MODE = "supabase"
EMAIL_MODE      = "resend"
CALENDAR_MODE   = "google"
PAYMENTS_MODE   = "mock"
ANTIBOT_MODE    = "turnstile"
TURNSTILE_TEST_SECRET_KEY_ALWAYS_FAIL = "2x0000000000000000000000000000000AB"
TURNSTILE_TEST_SECRET_KEY_PASS = "1x0000000000000000000000000000000AA"
TURNSTILE_TEST_SITE_KEY_ALWAYS_FAIL = "2x00000000000000000000AB"
TURNSTILE_TEST_SITE_KEY_PASS = "1x00000000000000000000AA"
SITE_URL = "https://letsilluminate.co"
SESSION_ADDRESS = "Via Example 1, 6900 Lugano"
SESSION_MAPS_URL = "https://maps.google.com/?q=Lugano+Switzerland"
API_ALLOWED_ORIGINS = "https://letsilluminate.co,https://admin.letsilluminate.co,https://yairb.ch,https://www.yairb.ch"
GOOGLE_CALENDAR_ID = "yairilluminate@gmail.com"
GOOGLE_TOKEN_URI   = "https://oauth2.googleapis.com/token"
TIMEZONE           = "Europe/Zurich"
IMAGE_BASE_URL     = "https://images.letsilluminate.co" # CDN/public origin for R2 objects
OBSERVABILITY_SCHEMA = "public"
ADMIN_AUTH_DISABLED = "true" # TEMPORARY ONLY: bypass /api/admin/* auth for manual testing

[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "illuminate-images"

# Local-only overrides (used by `wrangler dev --env local`)
[env.local.vars]
REPOSITORY_MODE = "mock"
EMAIL_MODE      = "mock"
CALENDAR_MODE   = "mock"
PAYMENTS_MODE   = "mock"
ANTIBOT_MODE    = "turnstile"
TURNSTILE_TEST_SECRET_KEY_ALWAYS_FAIL = "2x0000000000000000000000000000000AB"
TURNSTILE_TEST_SECRET_KEY_PASS = "1x0000000000000000000000000000000AA"
TURNSTILE_TEST_SITE_KEY_ALWAYS_FAIL = "2x00000000000000000000AB"
TURNSTILE_TEST_SITE_KEY_PASS = "1x00000000000000000000AA"
SITE_URL = "http://localhost:8080"
SESSION_ADDRESS = "Via Example 1, 6900 Lugano"
SESSION_MAPS_URL = "https://maps.google.com/?q=Lugano+Switzerland"
API_ALLOWED_ORIGINS = "http://localhost:8080,http://localhost:8788,http://localhost:5173"
GOOGLE_CALENDAR_ID = "yairilluminate@gmail.com"
GOOGLE_TOKEN_URI   = "https://oauth2.googleapis.com/token"
TIMEZONE           = "Europe/Zurich"
ADMIN_DEV_EMAIL    = "dev@localhost"
IMAGE_BASE_URL     = "http://localhost:8787/images" # dev placeholder; map via local proxy if needed
OBSERVABILITY_SCHEMA = "public"
ADMIN_AUTH_DISABLED = "true"

# Secrets — set via `wrangler secret put <NAME>` for prod, never commit values:
# SUPABASE_URL
# SUPABASE_SECRET_KEY
# RESEND_API_KEY
# GOOGLE_CLIENT_EMAIL         ← service account email (calendar freeBusy + create/update/delete + Google Drive backup)
# GOOGLE_PRIVATE_KEY          ← service account private key (calendar freeBusy + create/update/delete + Google Drive backup)
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# TURNSTILE_SITE_KEY
# TURNSTILE_SECRET_KEY
# TURNSTILE_TEST_SITE_KEY_PASS
# TURNSTILE_TEST_SITE_KEY_ALWAYS_FAIL
# TURNSTILE_TEST_SECRET_KEY_PASS
# TURNSTILE_TEST_SECRET_KEY_ALWAYS_FAIL
# JOB_SECRET
# ADMIN_ALLOWED_EMAILS
# ADMIN_DEV_EMAIL
# CLOUDFLARE_ACCESS_AUD

# Cloudflare Workers log delivery toggle. This is platform logging, not the retired DB schema.
[observability.logs]
enabled = true

[triggers]
# Unified cron sweep:
# - every minute: run all booking due checks + side-effects dispatch + calendar sync retries
crons = ["* * * * *"]
