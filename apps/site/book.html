<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Book a 1:1 Clarity Session or register for an ILLUMINATE Evening with Yair Benharroch in Lugano." />
  <title>Book — ILLUMINATE by Yair Benharroch</title>

  <link rel="icon" type="image/png" href="img/Rosenlaui_icon.jpeg" />

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/book.css" />
  <link rel="stylesheet" href="css/add-to-calendar.css" />
</head>

<body data-page="book">
  <!-- Restore saved theme immediately — before any element renders (prevents FOUC) -->
  <script>
    (function () {
      var t = localStorage.getItem('yb-theme') || 'light';
      if (t === 'light') document.body.classList.add('theme-light');
    })();
  </script>

  <!-- Skip link -->
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- ── Fixed background image layer (light mode) ── -->
  <div id="bg-layer" aria-hidden="true"></div>

  <!-- ── Canvas wave background ── -->
  <canvas id="background-waves" aria-hidden="true"></canvas>


  <!-- ══════════════════════════════════════════════════════
       NAVIGATION
  ══════════════════════════════════════════════════════ -->
  <nav
    class="nav"
    role="navigation"
    aria-label="Main navigation"
    data-nav-variant="default"
    data-home-links="index"
    data-logo-href="index.html"
    data-cta-href="sessions.html"
    data-inline-theme-toggle="false"></nav>

  <!-- ══════════════════════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════════════════════ -->
  <main id="main" class="book-main">
    <div class="book-container">
      <div id="booking-app" aria-live="polite"></div>
    </div>
  </main>


  <!-- ══════════════════════════════════════════════════════
       FOOTER
  ══════════════════════════════════════════════════════ -->
  <footer class="footer" data-footer-variant="default" data-home-links="index"></footer>

  <!-- ── Theme toggle button ── -->
  <button id="theme-toggle" class="theme-toggle" aria-label="Switch to light mode" title="Toggle theme">
    <!-- Moon icon (shown in dark mode) -->
    <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
    </svg>
    <!-- Sun icon (shown in light mode) -->
    <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="5" />
      <line x1="12" y1="1" x2="12" y2="3" />
      <line x1="12" y1="21" x2="12" y2="23" />
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
      <line x1="1" y1="12" x2="3" y2="12" />
      <line x1="21" y1="12" x2="23" y2="12" />
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
    </svg>
  </button>

  <script src="js/api-base.js"></script>
  <script src="js/client.js"></script>
  <script src="js/coupon.js"></script>
  <script src="js/site-nav.js"></script>
  <script src="js/main.js"></script>
  <script src="js/add-to-calendar.js"></script>
  <script src="js/api.js"></script>
    <script src="js/turnstile.js"></script>
    <script src="js/book-shared.js"></script>
    <script src="js/book-effects.js"></script>
    <script src="js/book-views.js"></script>
    <script src="js/book.js"></script>
</body>

</html>
