<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checking Payment… – ILLUMINATE</title>
  <link rel="icon" type="image/png" href="img/Rosenlaui_icon.jpeg" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .result-page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .result-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-card);
    }
    .result-title { font-size: 1.75rem; font-weight: 700; margin: 0 0 .75rem; color: var(--color-text); }
    .result-msg { color: var(--color-text-muted); margin: 0 0 2rem; line-height: 1.6; }
    .result-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<main class="result-page">
  <div class="result-card" id="continue-payment-card">
    <h1 class="result-title">Checking your booking…</h1>
    <p class="result-msg">Please wait a moment while we verify that payment can still continue.</p>
  </div>
</main>
<script src="js/api-base.js"></script>
<script src="js/client.js"></script>
<script src="js/pages/continue-payment.js"></script>
</body>
</html>
