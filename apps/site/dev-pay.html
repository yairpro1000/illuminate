<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev: Simulate Payment – ILLUMINATE</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    body { background: repeating-linear-gradient(45deg, #f9f0e8 0, #f9f0e8 10px, #fdf6f0 10px, #fdf6f0 20px); }
    .dev-page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .dev-card {
      background: #fff;
      border: 2px dashed oklch(75% 0.1 50);
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .dev-badge {
      display: inline-block;
      background: oklch(90% 0.12 60);
      color: oklch(40% 0.15 60);
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .2rem .6rem;
      border-radius: .25rem;
      margin-bottom: 1rem;
    }
    .dev-title { font-size: 1.25rem; font-weight: 700; margin: 0 0 .5rem; }
    .dev-detail { color: #888; margin: 0 0 2rem; font-size: .9rem; }
    .dev-actions { display: flex; flex-direction: column; gap: .75rem; }
    .btn-success { background: oklch(55% 0.15 150); color: #fff; }
    .btn-success:hover { background: oklch(50% 0.15 150); }
    .btn-fail { background: oklch(55% 0.15 25); color: #fff; }
    .btn-fail:hover { background: oklch(50% 0.15 25); }
  </style>
</head>
<body>
<main class="dev-page">
  <div class="dev-card">
    <p class="dev-badge">⚙ Dev mode — mock payment</p>
    <h1 class="dev-title">Stripe Checkout (simulated)</h1>
    <p class="dev-detail" id="dev-detail">Loading payment details…</p>
    <div class="dev-actions">
      <button class="btn btn-success" id="btn-success">✓ Simulate payment success</button>
      <button class="btn btn-fail" id="btn-fail">✗ Simulate payment failure</button>
    </div>
    <p style="margin-top:1.5rem;font-size:.8rem;color:#aaa">This page only appears in PROVIDERS_MODE=mock</p>
  </div>
</main>
<script src="js/api-base.js"></script>
<script src="js/pages/dev-pay.js"></script>
</body>
</html>
