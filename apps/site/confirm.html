<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirming… – ILLUMINATE</title>
  <link rel="icon" type="image/png" href="img/Rosenlaui_icon.jpeg" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .confirm-page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .confirm-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-card);
    }
    .confirm-icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; }
    .confirm-title { font-size: 1.5rem; font-weight: 700; margin: 0 0 .75rem; color: var(--color-text); }
    .confirm-msg { color: var(--color-text-muted); margin: 0 0 2rem; line-height: 1.6; }
  </style>
</head>
<body>
<main class="confirm-page">
  <div class="confirm-card" id="confirm-card"></div>
</main>
<script src="js/api-base.js"></script>
<script src="js/client.js"></script>
<script src="js/mock-email-preview.js"></script>
<script src="js/pages/confirm.js"></script>
</body>
</html>
