<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirming… – ILLUMINATE</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .confirm-page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .confirm-card {
      background: var(--color-surface, #fff);
      border-radius: 1rem;
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 24px rgba(0,0,0,.08);
    }
    .confirm-icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; }
    .confirm-title { font-size: 1.5rem; font-weight: 700; margin: 0 0 .75rem; }
    .confirm-msg { color: var(--color-muted, #666); margin: 0 0 2rem; line-height: 1.6; }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<main class="confirm-page">
  <div class="confirm-card" id="confirm-card">
    <div class="confirm-icon" aria-hidden="true">
      <svg viewBox="0 0 64 64" fill="none" class="spinner">
        <circle cx="32" cy="32" r="28" stroke="var(--color-lake-mist,#cde)" stroke-width="3"/>
        <path d="M32 4a28 28 0 0 1 28 28" stroke="var(--color-lake,#4a8fa8)" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>
    <h1 class="confirm-title">Confirming…</h1>
    <p class="confirm-msg">Please wait a moment.</p>
  </div>
</main>
<script src="js/api-base.js"></script>
<script src="js/pages/confirm.js"></script>
</body>
</html>
