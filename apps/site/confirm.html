<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirming… – ILLUMINATE</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .confirm-page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .confirm-card {
      background: var(--color-surface, #fff);
      border-radius: 1rem;
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 24px rgba(0,0,0,.08);
    }
    .confirm-icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; }
    .confirm-title { font-size: 1.5rem; font-weight: 700; margin: 0 0 .75rem; }
    .confirm-msg { color: var(--color-muted, #666); margin: 0 0 2rem; line-height: 1.6; }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<main class="confirm-page">
  <div class="confirm-card" id="confirm-card">
    <div class="confirm-icon" aria-hidden="true">
      <svg viewBox="0 0 64 64" fill="none" class="spinner">
        <circle cx="32" cy="32" r="28" stroke="var(--color-lake-mist,#cde)" stroke-width="3"/>
        <path d="M32 4a28 28 0 0 1 28 28" stroke="var(--color-lake,#4a8fa8)" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>
    <h1 class="confirm-title">Confirming…</h1>
    <p class="confirm-msg">Please wait a moment.</p>
  </div>
</main>
<script>
(async function () {
  const API_BASE = localStorage.getItem('API_BASE') ||
    (location.hostname === 'localhost' ? 'http://localhost:8787' : '');
  const params  = new URLSearchParams(window.location.search);
  const type    = params.get('type');
  const token   = params.get('token');
  const id      = params.get('id');
  const card    = document.getElementById('confirm-card');

  function show(icon, title, msg, linkHref, linkText) {
    card.innerHTML = `
      <div class="confirm-icon" aria-hidden="true">${icon}</div>
      <h1 class="confirm-title">${title}</h1>
      <p class="confirm-msg">${msg}</p>
      ${linkHref ? `<a href="${linkHref}" class="btn btn-primary">${linkText}</a>` : ''}
    `;
  }

  const checkSvg = `<svg viewBox="0 0 64 64" fill="none">
    <circle cx="32" cy="32" r="30" stroke="var(--color-lake,#4a8fa8)" stroke-width="1.5"/>
    <polyline points="18,32 28,42 46,22" stroke="var(--color-lake,#4a8fa8)"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;

  const warnSvg = `<svg viewBox="0 0 64 64" fill="none">
    <circle cx="32" cy="32" r="30" stroke="oklch(55% 0.18 25)" stroke-width="1.5"/>
    <line x1="32" y1="20" x2="32" y2="38" stroke="oklch(55% 0.18 25)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="32" cy="46" r="2.5" fill="oklch(55% 0.18 25)"/>
  </svg>`;

  if (!type || !token || !id) {
    show(warnSvg, 'Invalid link', 'This confirmation link is missing required information.', 'index.html', '← Homepage');
    return;
  }

  try {
    const url = `${API_BASE}/api/confirm?type=${encodeURIComponent(type)}&token=${encodeURIComponent(token)}&id=${encodeURIComponent(id)}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (!res.ok) {
      const expired = res.status === 410;
      show(
        warnSvg,
        expired ? 'Link expired' : 'Could not confirm',
        expired
          ? 'This confirmation link has expired. Please make a new booking.'
          : (data.message || 'Something went wrong. Please try again or contact us.'),
        'index.html',
        '← Homepage',
      );
      return;
    }

    const noun = type === 'booking' ? 'booking' : 'registration';
    show(
      checkSvg,
      'Confirmed!',
      type === 'booking'
        ? 'Your booking is confirmed. We\'ve sent the next steps to your email.'
        : 'Your registration is confirmed. See you soon!',
      'index.html',
      '← Back to homepage',
    );
  } catch (err) {
    show(warnSvg, 'Connection error', 'Could not reach the server. Please check your connection and try again.', '', '');
  }
})();
</script>
</body>
</html>
