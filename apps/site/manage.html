<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Booking – ILLUMINATE</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .manage-page {
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
    }
    .manage-card {
      background: var(--color-surface, #fff);
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 2px 24px rgba(0,0,0,.08);
    }
    .manage-title { font-size: 1.5rem; font-weight: 700; margin: 0 0 .25rem; }
    .manage-subtitle { color: var(--color-muted, #666); margin: 0 0 2rem; }
    .detail-table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; }
    .detail-table th, .detail-table td { padding: .5rem 0; vertical-align: top; text-align: left; }
    .detail-table th { color: var(--color-muted, #888); font-weight: 500; width: 40%; font-size: .9rem; }
    .detail-table td { font-weight: 600; }
    .status-badge {
      display: inline-block;
      padding: .25rem .75rem;
      border-radius: 2rem;
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .status-badge--confirmed  { background: oklch(90% 0.08 150); color: oklch(40% 0.12 150); }
    .status-badge--pending    { background: oklch(95% 0.08 60);  color: oklch(45% 0.12 60); }
    .status-badge--cancelled  { background: oklch(93% 0.05 0);   color: oklch(45% 0.1 0); }
    .manage-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .confirm-dialog {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem; z-index: 100;
    }
    .confirm-dialog__box {
      background: #fff; border-radius: 1rem; padding: 2rem;
      max-width: 400px; width: 100%;
    }
    .confirm-dialog__title { font-size: 1.1rem; font-weight: 700; margin: 0 0 .5rem; }
    .confirm-dialog__msg   { color: var(--color-muted,#666); margin: 0 0 1.5rem; }
    .confirm-dialog__btns  { display: flex; gap: .75rem; justify-content: flex-end; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
<main class="manage-page">
  <div class="manage-card" id="manage-card">
    <p style="color:var(--color-muted,#888)">Loading…</p>
  </div>
</main>

<!-- Cancel confirmation dialog -->
<div class="confirm-dialog" id="cancel-dialog" hidden>
  <div class="confirm-dialog__box">
    <h2 class="confirm-dialog__title">Cancel this booking?</h2>
    <p class="confirm-dialog__msg">This action cannot be undone. Please check our cancellation policy before proceeding.</p>
    <div class="confirm-dialog__btns">
      <button class="btn btn-ghost" id="cancel-no">Keep it</button>
      <button class="btn btn-primary" id="cancel-yes" style="background:oklch(50% 0.15 25)">Yes, cancel</button>
    </div>
  </div>
</div>

<script src="js/api-base.js"></script>
<script src="js/pages/manage.js"></script>
</body>
</html>
