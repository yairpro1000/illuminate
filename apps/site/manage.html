<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Booking – ILLUMINATE</title>
  <link rel="icon" type="image/png" href="img/Rosenlaui_icon.jpeg" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/add-to-calendar.css" />
  <style>
    .manage-page {
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
    }
    .manage-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 2.5rem 2rem;
      max-width: 520px;
      width: 100%;
      box-shadow: var(--shadow-card);
    }
    .manage-title { font-size: 1.5rem; font-weight: 700; margin: 0 0 .25rem; color: var(--color-text); }
    .manage-subtitle { color: var(--color-text-muted); margin: 0 0 2rem; }
    .detail-table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; }
    .detail-table th, .detail-table td { padding: .5rem 0; vertical-align: top; text-align: left; }
    .detail-table th { color: var(--color-text-muted); font-weight: 500; width: 40%; font-size: .9rem; }
    .detail-table td { font-weight: 600; color: var(--color-text); }
    .status-badge {
      display: inline-block;
      padding: .25rem .75rem;
      border-radius: 2rem;
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    /* Dark-mode first */
    .status-badge--confirmed { background: oklch(40% 0.12 150 / 0.25); color: oklch(73% 0.12 150); }
    .status-badge--pending   { background: oklch(40% 0.12 60  / 0.25); color: oklch(78% 0.10 60); }
    .status-badge--cancelled { background: oklch(40% 0.02 210 / 0.20); color: var(--color-text-muted); }
    /* Light-mode overrides */
    body.theme-light .status-badge--confirmed { background: oklch(90% 0.08 150); color: oklch(35% 0.12 150); }
    body.theme-light .status-badge--pending   { background: oklch(95% 0.08 60);  color: oklch(40% 0.12 60); }
    body.theme-light .status-badge--cancelled { background: oklch(92% 0.03 210); color: oklch(40% 0.02 210); }
    .manage-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .policy-box {
      margin: 0 0 1rem;
      padding: .875rem 1rem;
      border: 1px solid var(--color-border);
      border-radius: .75rem;
      color: var(--color-text-muted);
      font-size: .95rem;
      line-height: 1.6;
    }
    .policy-box--text {
      white-space: pre-line;
    }
    .policy-box__title {
      margin: 0 0 .5rem;
      color: var(--color-text);
    }
    .policy-box__list {
      margin: 0;
      padding-left: 1.25rem;
      list-style-type: disc;
      list-style-position: outside;
    }
    .policy-box__list li {
      margin: .15rem 0;
    }
    .policy-box a {
      color: var(--color-lake-light);
    }
    .rebook-section { margin: 0 0 1.5rem; }
    .rebook-section__label { font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; font-weight: 600; color: var(--color-text-muted); margin: 0 0 .5rem; }
    .rebook-pill {
      display: flex; align-items: center; justify-content: space-between; gap: .75rem;
      padding: .75rem 1rem;
      border: 1px solid var(--color-border);
      border-radius: .75rem;
      text-decoration: none;
      color: var(--color-text);
      margin-bottom: .5rem;
      transition: border-color .15s;
    }
    .rebook-pill:hover { border-color: var(--color-lake-light); }
    .rebook-pill__content { display: flex; flex-direction: column; gap: .15rem; min-width: 0; }
    .rebook-pill__title { font-weight: 600; font-size: .95rem; }
    .rebook-pill__meta  { font-size: .8rem; color: var(--color-text-muted); }
    .rebook-pill__price { font-size: .875rem; color: var(--color-text-muted); white-space: nowrap; flex-shrink: 0; }
    .rebook-section__browse { font-size: .82rem; color: var(--color-lake-light); text-decoration: none; display: inline-block; margin-top: .25rem; }
    .rebook-section__browse:hover { text-decoration: underline; }
    .confirm-dialog {
      position: fixed; inset: 0;
      background: oklch(0% 0 0 / 0.6);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem; z-index: 100;
    }
    .confirm-dialog__box {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 2rem;
      max-width: 400px; width: 100%;
    }
    .confirm-dialog__title { font-size: 1.1rem; font-weight: 700; margin: 0 0 .5rem; color: var(--color-text); }
    .confirm-dialog__msg   { color: var(--color-text-muted); margin: 0 0 1.5rem; }
    .confirm-dialog__btns  { display: flex; gap: .75rem; justify-content: flex-end; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
<main class="manage-page">
  <div class="manage-card" id="manage-card">
    <p style="color:var(--color-muted,#888)">Loading…</p>
  </div>
</main>

<!-- Cancel confirmation dialog -->
<div class="confirm-dialog" id="cancel-dialog" hidden>
  <div class="confirm-dialog__box">
    <h2 class="confirm-dialog__title">Cancel this booking?</h2>
    <p class="confirm-dialog__msg" id="cancel-dialog-msg">This action cannot be undone online.</p>
    <div class="confirm-dialog__btns">
      <button class="btn btn-ghost" id="cancel-no">Keep booking</button>
      <button class="btn btn-primary" id="cancel-yes" style="background:oklch(50% 0.15 25)">Yes, cancel booking</button>
    </div>
  </div>
</div>

<script src="js/api-base.js"></script>
<script src="js/client.js"></script>
<script src="js/add-to-calendar.js"></script>
<script src="js/mock-email-preview.js"></script>
<script src="js/pages/manage.js"></script>
</body>
</html>
