<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled – ILLUMINATE</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .result-page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .result-card {
      background: var(--color-surface, #fff);
      border-radius: 1rem;
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 24px rgba(0,0,0,.08);
    }
    .result-icon { width: 72px; height: 72px; margin: 0 auto 1.5rem; }
    .result-title { font-size: 1.75rem; font-weight: 700; margin: 0 0 .75rem; }
    .result-msg { color: var(--color-muted, #666); margin: 0 0 2rem; line-height: 1.6; }
    .result-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<main class="result-page">
  <div class="result-card">
    <div class="result-icon" aria-hidden="true">
      <svg viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="30" stroke="oklch(65% 0.12 50)" stroke-width="1.5"/>
        <path d="M22 22l20 20M42 22L22 42" stroke="oklch(65% 0.12 50)"
              stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1 class="result-title">Payment not completed</h1>
    <p class="result-msg">
      No payment was taken. Your slot may still be held briefly — you can try again or choose a different option.
    </p>
    <div class="result-actions">
      <a href="javascript:history.back()" class="btn btn-primary">← Try again</a>
      <a href="index.html" class="btn btn-ghost">Back to homepage</a>
    </div>
  </div>
</main>
</body>
</html>
