<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev: Sent Emails – ILLUMINATE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: repeating-linear-gradient(45deg, #f9f0e8 0, #f9f0e8 10px, #fdf6f0 10px, #fdf6f0 20px);
      min-height: 100dvh;
      padding: 2rem 1rem;
      color: #222;
    }
    .page { max-width: 720px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .dev-badge {
      display: inline-block;
      background: oklch(90% 0.12 60);
      color: oklch(40% 0.15 60);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .2rem .6rem;
      border-radius: .25rem;
    }
    h1 { margin: 0; font-size: 1.25rem; font-weight: 700; }
    .refresh-btn {
      margin-left: auto;
      padding: .4rem .9rem;
      background: #222;
      color: #fff;
      border: none;
      border-radius: .4rem;
      font-size: .85rem;
      cursor: pointer;
    }
    .refresh-btn:hover { background: #444; }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: #999;
      background: #fff;
      border-radius: 1rem;
      border: 2px dashed #ddd;
    }

    .email-list { display: flex; flex-direction: column; gap: 1rem; }
    .email-layout {
      display: grid;
      grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
    }
    .email-sidebar { min-width: 0; }
    .email-preview-shell {
      background: #fff;
      border-radius: .75rem;
      border: 1px solid #e8e0d8;
      overflow: hidden;
      min-height: 70dvh;
    }
    .email-preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      padding: .85rem 1rem;
      background: #faf7f4;
      border-bottom: 1px solid #e8e0d8;
    }
    .email-preview-meta { min-width: 0; }
    .email-preview-title {
      margin: 0;
      font-size: .95rem;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .email-preview-to {
      margin: .2rem 0 0;
      color: #888;
      font-size: .82rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .email-preview-link {
      color: oklch(35% 0.12 250);
      font-size: .8rem;
      text-decoration: none;
      white-space: nowrap;
    }
    .email-preview-frame {
      display: block;
      width: 100%;
      min-height: calc(70dvh - 58px);
      border: 0;
      background: #d7dfe4;
    }
    .email-card {
      cursor: pointer;
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    .email-card:hover {
      border-color: #d3c7bc;
      box-shadow: 0 8px 24px rgba(34, 34, 34, 0.06);
      transform: translateY(-1px);
    }
    .email-card.is-active {
      border-color: oklch(68% 0.10 250);
      box-shadow: 0 0 0 2px rgba(81, 110, 224, 0.14);
    }

    .email-card {
      appearance: none;
      width: 100%;
      padding: 0;
      text-align: left;
      background: #fff;
      border-radius: .75rem;
      border: 1px solid #e8e0d8;
      overflow: hidden;
    }
    .email-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: .25rem .75rem;
      align-items: baseline;
      padding: .85rem 1rem;
      background: #faf7f4;
      border-bottom: 1px solid #e8e0d8;
    }
    .email-kind {
      grid-column: 1;
      grid-row: 1 / 3;
      align-self: center;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      background: oklch(90% 0.08 250);
      color: oklch(35% 0.12 250);
      padding: .15rem .5rem;
      border-radius: .2rem;
      white-space: nowrap;
    }
    .email-subject {
      grid-column: 2;
      font-weight: 600;
      font-size: .95rem;
    }
    .email-to {
      grid-column: 2;
      color: #888;
      font-size: .82rem;
    }
    .email-time {
      grid-column: 3;
      grid-row: 1 / 3;
      align-self: center;
      color: #aaa;
      font-size: .78rem;
      white-space: nowrap;
    }
    .email-body {
      padding: 1rem;
      white-space: pre-wrap;
      line-height: 1.65;
      color: #333;
      font-size: .875rem;
    }
    .email-body a {
      color: oklch(45% 0.14 250);
      word-break: break-all;
    }
    @media (max-width: 960px) {
      .email-layout { grid-template-columns: 1fr; }
      .email-preview-shell { min-height: 60dvh; }
      .email-preview-frame { min-height: calc(60dvh - 58px); }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <span class="dev-badge">Dev mode</span>
    <h1>Sent Emails</h1>
    <button class="refresh-btn" id="refresh-btn">Refresh</button>
  </div>
  <div id="content"><p style="color:#aaa">Loading…</p></div>
</div>

<script src="js/api-base.js"></script>
<script src="js/pages/dev-emails.js"></script>
</body>
</html>
