<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev: Sent Emails – ILLUMINATE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: repeating-linear-gradient(45deg, #f9f0e8 0, #f9f0e8 10px, #fdf6f0 10px, #fdf6f0 20px);
      min-height: 100dvh;
      padding: 2rem 1rem;
      color: #222;
    }
    .page { max-width: 720px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .dev-badge {
      display: inline-block;
      background: oklch(90% 0.12 60);
      color: oklch(40% 0.15 60);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .2rem .6rem;
      border-radius: .25rem;
    }
    h1 { margin: 0; font-size: 1.25rem; font-weight: 700; }
    .refresh-btn {
      margin-left: auto;
      padding: .4rem .9rem;
      background: #222;
      color: #fff;
      border: none;
      border-radius: .4rem;
      font-size: .85rem;
      cursor: pointer;
    }
    .refresh-btn:hover { background: #444; }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: #999;
      background: #fff;
      border-radius: 1rem;
      border: 2px dashed #ddd;
    }

    .email-list { display: flex; flex-direction: column; gap: 1rem; }

    .email-card {
      background: #fff;
      border-radius: .75rem;
      border: 1px solid #e8e0d8;
      overflow: hidden;
    }
    .email-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: .25rem .75rem;
      align-items: baseline;
      padding: .85rem 1rem;
      background: #faf7f4;
      border-bottom: 1px solid #e8e0d8;
    }
    .email-kind {
      grid-column: 1;
      grid-row: 1 / 3;
      align-self: center;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      background: oklch(90% 0.08 250);
      color: oklch(35% 0.12 250);
      padding: .15rem .5rem;
      border-radius: .2rem;
      white-space: nowrap;
    }
    .email-subject {
      grid-column: 2;
      font-weight: 600;
      font-size: .95rem;
    }
    .email-to {
      grid-column: 2;
      color: #888;
      font-size: .82rem;
    }
    .email-time {
      grid-column: 3;
      grid-row: 1 / 3;
      align-self: center;
      color: #aaa;
      font-size: .78rem;
      white-space: nowrap;
    }
    .email-body {
      padding: 1rem;
      white-space: pre-wrap;
      line-height: 1.65;
      color: #333;
      font-size: .875rem;
    }
    .email-body a {
      color: oklch(45% 0.14 250);
      word-break: break-all;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <span class="dev-badge">Dev mode</span>
    <h1>Sent Emails</h1>
    <button class="refresh-btn" id="refresh-btn">Refresh</button>
  </div>
  <div id="content"><p style="color:#aaa">Loading…</p></div>
</div>

<script>
(async function () {
  const API_BASE = localStorage.getItem('API_BASE') ||
    (location.hostname === 'localhost' ? 'http://localhost:8787' : '');

  const content = document.getElementById('content');

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-GB', {
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      day: 'numeric', month: 'short',
    });
  }

  async function load() {
    content.innerHTML = '<p style="color:#aaa">Loading…</p>';
    try {
      const res  = await fetch(API_BASE + '/api/__dev/emails');
      const data = await res.json();
      const emails = data.emails || [];

      if (!emails.length) {
        content.innerHTML = '<div class="empty">No emails sent yet.<br>Complete a booking or registration to see emails here.</div>';
        return;
      }

      content.innerHTML = '<div class="email-list">' +
        emails.map(e => `
          <div class="email-card">
            <div class="email-header">
              <span class="email-kind">${e.kind.replace(/_/g, ' ')}</span>
              <span class="email-subject">${e.subject}</span>
              <span class="email-to">To: ${e.to}</span>
              <span class="email-time">${formatTime(e.sentAt)}</span>
            </div>
            <div class="email-body">Preview redacted in dev summary. Open the mail provider mock or logs if you need full content.</div>
          </div>
        `).join('') +
        '</div>';
    } catch (err) {
      content.innerHTML = `<div class="empty" style="color:oklch(50% 0.15 25)">Error: ${err.message}</div>`;
    }
  }

  document.getElementById('refresh-btn').addEventListener('click', load);
  load();
})();
</script>
</body>
</html>
