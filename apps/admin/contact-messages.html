<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ILLUMINATE Admin — Contact Messages</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>if(localStorage.getItem('yb-theme')==='light')document.documentElement.classList.add('theme-light');</script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

      /* ── Design Tokens ── */
      :root {
        --color-bg:           oklch(11%  0.022 210);
        --color-bg-alt:       oklch(14%  0.025 208);
        --color-bg-card:      oklch(17%  0.030 207);
        --color-lake-deep:    oklch(44%  0.155 204);
        --color-lake:         oklch(59%  0.160 200);
        --color-lake-lt:      oklch(73%  0.130 195);
        --color-lake-mist:    oklch(59%  0.160 200 / 0.14);
        --color-text:         oklch(91%  0.015 200);
        --color-text-muted:   oklch(65%  0.020 207);
        --color-text-subtle:  oklch(48%  0.018 210);
        --color-border:       oklch(59%  0.160 200 / 0.18);
        --color-border-hover: oklch(59%  0.160 200 / 0.42);
        --color-ok:           oklch(75%  0.14 145);
        --color-danger:       oklch(72%  0.18 25);
        --radius-sm: 0.375rem;
        --radius-md: 0.75rem;
        --admin-sidebar-w: 15rem;
        --admin-header-h:  3.5rem;
        --admin-content-p: 1.5rem;
        --admin-row-h:     2.75rem;
        --font: 'Inter', system-ui, -apple-system, sans-serif;
      }

      html.theme-light {
        --color-bg:           oklch(97% 0.006 210);
        --color-bg-alt:       oklch(93% 0.008 210);
        --color-bg-card:      oklch(100% 0 0);
        --color-text:         oklch(15% 0.025 210);
        --color-text-muted:   oklch(40% 0.020 207);
        --color-text-subtle:  oklch(55% 0.018 210);
        --color-border:       oklch(44% 0.155 204 / 0.20);
        --color-border-hover: oklch(44% 0.155 204 / 0.45);
        --color-ok:           oklch(35% 0.14 145);
        --color-danger:       oklch(45% 0.18 25);
      }

      /* ── Reset ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--font);
        background: var(--color-bg);
        color: var(--color-text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.6;
      }

      a { color: var(--color-lake-lt); }

      /* ── Admin Shell ── */
      .admin-shell {
        display: grid;
        grid-template-columns: var(--admin-sidebar-w) 1fr;
        grid-template-rows: var(--admin-header-h) 1fr;
        min-height: 100dvh;
      }

      .admin-header {
        grid-column: 1 / -1;
        background: var(--color-bg-alt);
        border-bottom: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        padding-inline: 1rem;
        gap: 1rem;
      }

      .admin-header__logo {
        font-weight: 700;
        font-size: 0.95rem;
        letter-spacing: 0.05em;
        color: var(--color-lake-lt);
      }

      .admin-header__spacer { flex: 1; }

      .theme-toggle {
        background: transparent;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        color: var(--color-text-muted);
        padding: 0.25rem 0.625rem;
        font-family: var(--font);
        font-size: 0.8125rem;
        font-weight: 400;
        cursor: pointer;
        line-height: 1.5;
      }
      .theme-toggle:hover {
        border-color: var(--color-border-hover);
        color: var(--color-text);
      }

      .admin-sidebar {
        background: var(--color-bg-alt);
        border-right: 1px solid var(--color-border);
        padding: 1rem 0;
        overflow-y: auto;
      }

      .admin-content {
        padding: var(--admin-content-p);
        overflow-y: auto;
      }

      /* ── Sidebar Nav ── */
      .admin-nav { display: flex; flex-direction: column; }

      .admin-nav-link {
        display: flex;
        align-items: center;
        padding: 0.5rem 1rem;
        color: var(--color-text-muted);
        font-size: 0.875rem;
        font-weight: 500;
        border-left: 2px solid transparent;
        text-decoration: none;
      }
      .admin-nav-link:hover {
        color: var(--color-text);
        background: var(--color-lake-mist);
      }
      .admin-nav-link.active {
        color: var(--color-lake-lt);
        border-left-color: var(--color-lake);
        background: var(--color-lake-mist);
      }

      /* ── Cards ── */
      .card {
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: 1.25rem;
        margin-bottom: 0.75rem;
      }

      /* ── Typography ── */
      h1 { margin: 0 0 0.625rem; font-size: 1.25rem; font-weight: 600; }
      .muted { color: var(--color-text-muted); font-size: 0.875rem; }
      .hidden { display: none !important; }

      /* ── Form Elements ── */
      label {
        display: block;
        font-size: 0.75rem;
        margin-bottom: 0.25rem;
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      input, select {
        font-family: var(--font);
        font-size: 0.875rem;
        background: var(--color-bg-alt);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        color: var(--color-text);
        padding: 0.5rem 0.75rem;
        width: 100%;
      }
      input:focus, select:focus {
        outline: none;
        border-color: var(--color-lake);
      }
      option { background: var(--color-bg-alt); color: var(--color-text); }

      /* ── Buttons ── */
      button {
        font-family: var(--font);
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid transparent;
        border-radius: var(--radius-sm);
        padding: 0.5rem 1rem;
        background: var(--color-lake-deep);
        color: var(--color-text);
      }
      button:hover { background: var(--color-lake); }

      button.secondary {
        background: transparent;
        border-color: var(--color-border);
        color: var(--color-lake-lt);
        font-weight: 500;
      }
      button.secondary:hover {
        background: var(--color-lake-mist);
        border-color: var(--color-border-hover);
      }

      button:disabled { opacity: 0.5; cursor: not-allowed; }

      /* ── Tables ── */
      table { width: 100%; border-collapse: collapse; font-size: 0.875rem; table-layout: fixed; }
      th {
        text-align: left;
        padding: 0.625rem 0.75rem;
        color: var(--color-text-subtle);
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border-bottom: 1px solid var(--color-border);
      }
      td {
        padding: 0.625rem 0.75rem;
        color: var(--color-text);
        border-bottom: 1px solid var(--color-border);
        height: var(--admin-row-h);
        vertical-align: top;
      }

      /* ── Column widths ── */
      .w-when    { width: 170px; }
      .w-first   { width: 150px; }
      .w-last    { width: 150px; }
      .w-email   { width: 240px; }
      .w-phone   { width: 160px; }
      .w-message { width: auto; }

      /* ── Sort button (inside th) ── */
      .sort-btn {
        border: 0;
        background: transparent;
        color: inherit;
        font-family: var(--font);
        font-size: inherit;
        font-weight: inherit;
        padding: 0;
        cursor: pointer;
        text-transform: inherit;
        letter-spacing: inherit;
      }
      .sort-btn:hover { color: var(--color-lake-lt); }

      /* ── Message preview button (inside td) ── */
      .message-preview {
        border: 0;
        background: transparent;
        padding: 0;
        margin: 0;
        color: inherit;
        font-family: var(--font);
        font-size: inherit;
        font-weight: 400;
        text-align: left;
        width: 100%;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .message-preview:hover { color: var(--color-lake-lt); }

      /* ── Status ── */
      .status { margin-top: 0.5rem; min-height: 1.4em; }
      .ok { color: var(--color-ok); }
      .err { color: var(--color-danger); white-space: pre-wrap; }

      /* ── Layout Helpers ── */
      .row { display: flex; gap: 0.625rem; flex-wrap: wrap; align-items: flex-end; }
      .col { display: flex; flex-direction: column; }
      .btnrow { display: flex; justify-content: flex-end; margin-top: 0.75rem; }

      /* ── Message full view ── */
      .message-full {
        white-space: pre-wrap;
        line-height: 1.6;
        background: var(--color-bg-alt);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        padding: 0.875rem;
        font-size: 0.9375rem;
      }

      /* ── Overlay / Modal ── */
      .overlay { position: fixed; inset: 0; background: oklch(0% 0 0 / 0.65); display: flex; align-items: center; justify-content: center; z-index: 1000; }
      .modal { width: min(1080px, 96vw); max-height: min(92vh, 900px); overflow: auto; }

      /* ── Mobile ── */
      @media (max-width: 48rem) {
        .admin-shell { grid-template-columns: 1fr; }
        .admin-sidebar { display: none; }
        .admin-sidebar.is-open { display: block; position: fixed; inset: var(--admin-header-h) 0 0 0; z-index: 100; }
      }
      @media (max-width: 860px) {
        .w-phone { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="admin-shell">
      <header class="admin-header">
        <span class="admin-header__logo">Admin</span>
        <span class="admin-header__spacer"></span>
        <button class="theme-toggle" id="admin-logout-button" type="button" title="Log out of Cloudflare Access and reopen the sign-in options">Logout</button>
        <button class="theme-toggle" id="themeToggle" type="button" title="Toggle light/dark mode">Light</button>
      </header>
      <nav class="admin-sidebar">
        <div class="admin-nav">
          <a href="index.html" class="admin-nav-link" data-page="index">Bookings</a>
          <a href="session-types.html" class="admin-nav-link" data-page="session-types">Edit Offers</a>
          <a href="contact-messages.html" class="admin-nav-link" data-page="contact-messages">Contact Messages</a>
          <a href="config.html" class="admin-nav-link" data-page="config">Config</a>
        </div>
      </nav>
      <main class="admin-content">
        <section class="card">
          <h1>Contact Messages</h1>
          <div class="row">
            <div class="col" style="min-width: 190px;">
              <label for="date">Date</label>
              <input id="date" type="date" />
            </div>
            <div class="col" style="min-width: 220px;">
              <label for="clientId">Client</label>
              <select id="clientId">
                <option value="">All clients</option>
              </select>
            </div>
            <div class="col" style="flex: 1 1 260px;">
              <label for="q">Free text</label>
              <input id="q" type="search" placeholder="Name, email, phone, message…" />
            </div>
            <div class="col">
              <button id="loadRows" type="button">Load messages</button>
            </div>
          </div>
          <div id="status" class="status muted"></div>
        </section>

        <section class="card">
          <table>
            <thead>
              <tr>
                <th class="w-when"><button class="sort-btn" type="button" data-sort="created_at">When</button></th>
                <th class="w-first"><button class="sort-btn" type="button" data-sort="client_first_name">First Name</button></th>
                <th class="w-last"><button class="sort-btn" type="button" data-sort="client_last_name">Last Name</button></th>
                <th class="w-email"><button class="sort-btn" type="button" data-sort="client_email">Email</button></th>
                <th class="w-phone">Phone</th>
                <th class="w-message">Message</th>
              </tr>
            </thead>
            <tbody id="rowsBody"></tbody>
          </table>
        </section>
      </main>
    </div>

    <div id="messageOverlay" class="overlay hidden" aria-hidden="true">
      <div class="card modal" role="dialog" aria-modal="true" aria-labelledby="messageTitle">
        <h1 id="messageTitle" style="font-size: 1.125rem; margin-bottom: 0.625rem;">Message</h1>
        <div id="messageMeta" class="muted" style="margin-bottom: 0.625rem;"></div>
        <div id="messageFull" class="message-full"></div>
        <div class="btnrow">
          <button id="closeMessage" type="button" class="secondary">Close</button>
        </div>
      </div>
    </div>

    <script>
      (function() {
        var btn = document.getElementById('themeToggle');
        function update() {
          var isLight = document.documentElement.classList.contains('theme-light');
          if (btn) btn.textContent = isLight ? 'Dark' : 'Light';
        }
        update();
        if (btn) btn.addEventListener('click', function() {
          document.documentElement.classList.toggle('theme-light');
          localStorage.setItem('yb-theme', document.documentElement.classList.contains('theme-light') ? 'light' : 'dark');
          update();
        });
      })();
    </script>
    <script src="js/layout.js"></script>
    <script src="js/api-base.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/client.js"></script>
    <script src="js/pages/contact-messages.js"></script>
  </body>
</html>
