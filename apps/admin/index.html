<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ILLUMINATE Admin</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        --bg: #f7f6f2;
        --card: #ffffff;
        --ink: #1f2937;
        --muted: #6b7280;
        --line: #d1d5db;
        --accent: #0d9488;
        --danger: #b91c1c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Segoe UI", Tahoma, sans-serif;
      }
      main {
        width: min(1180px, 96vw);
        margin: 22px auto 44px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.4rem;
      }
      .muted {
        color: var(--muted);
        font-size: 0.92rem;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: end;
      }
      .col {
        display: flex;
        flex-direction: column;
      }
      .hidden { display: none !important; }
      .small {
        font-size: 0.85rem;
      }
      .status {
        margin-top: 8px;
        min-height: 1.4em;
      }
      label {
        display: block;
        font-size: 0.82rem;
        margin-bottom: 4px;
        color: var(--muted);
      }
      input, select, textarea, button {
        font: inherit;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        background: #fff;
      }
      textarea {
        min-height: 90px;
        resize: vertical;
      }
      button {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
        cursor: pointer;
      }
      button.secondary {
        background: #fff;
        color: var(--ink);
        border-color: var(--line);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      a {
        color: var(--accent);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
      }
      th, td {
        text-align: left;
        border-bottom: 1px solid var(--line);
        padding: 8px;
        font-size: 0.9rem;
      }
      th {
        font-size: 0.8rem;
        color: var(--muted);
        text-transform: uppercase;
      }
      tbody tr.clickable {
        cursor: pointer;
      }
      tbody tr.clickable:hover {
        background: #f8fafc;
      }
      .ok {
        color: #047857;
      }
      .err {
        color: var(--danger);
        white-space: pre-wrap;
      }
      td.notes-cell {
        max-width: 220px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--muted);
        font-size: 0.85rem;
      }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .modal {
        width: min(980px, 96vw);
        max-height: min(92vh, 880px);
        overflow: auto;
      }
      .details-grid {
        width: 100%;
        border-collapse: collapse;
        margin: 8px 0 14px;
      }
      .details-grid td {
        padding: 6px 8px;
        border-bottom: 1px solid var(--line);
        font-size: 0.9rem;
        vertical-align: top;
      }
      .details-grid td:first-child {
        width: 180px;
        color: var(--muted);
        font-size: 0.82rem;
        text-transform: uppercase;
      }
      .btnrow {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      /* admin sidebar layout */
      .admin-layout { display: flex; min-height: 100vh; }
      .admin-sidebar {
        flex: 0 0 180px;
        width: 180px;
        background: var(--card);
        border-right: 1px solid var(--line);
        padding: 16px 10px;
        position: sticky;
        top: 0;
        height: 100vh;
      }
      .admin-logo { font-weight: 700; margin: 2px 0 10px; font-size: 0.95rem; color: var(--muted); }
      .admin-nav { display: flex; flex-direction: column; gap: 4px; }
      .admin-nav-link {
        display: block;
        padding: 7px 10px;
        border-radius: 8px;
        color: inherit;
        text-decoration: none;
      }
      .admin-nav-link:hover { background: #f3f4f6; }
      .admin-nav-link.active { background: var(--accent); color: #fff; }
      .admin-content { flex: 1; min-width: 0; }
      .search-bar { width: 100%; max-width: 340px; margin-bottom: 10px; }
      @media (max-width: 760px) {
        main {
          width: min(96vw, 96vw);
        }
        th:nth-child(4), td:nth-child(4) {
          display: none;
        }
        th:nth-child(6), td:nth-child(6) {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="admin-layout">
      <nav class="admin-sidebar">
        <div class="admin-logo">Admin</div>
        <div class="admin-nav">
          <a href="index.html" class="admin-nav-link" data-page="index">Bookings</a>
          <a href="session-types.html" class="admin-nav-link" data-page="session-types">Edit Offers</a>
          <a href="contact-messages.html" class="admin-nav-link" data-page="contact-messages">Contact Messages</a>
        </div>
      </nav>
      <main class="admin-content">
      <section class="card">
        <div class="row">
          <div class="col" style="min-width: 180px;">
            <label for="source">Source</label>
            <select id="source">
              <option value="event">Event</option>
              <option value="session">Session</option>
            </select>
          </div>
          <div id="eventWrap" class="col" style="min-width: 260px;">
            <label for="eventId">Event</label>
            <select id="eventId">
              <option value="">All events</option>
            </select>
          </div>
          <div id="dateWrap" class="col hidden" style="min-width: 190px;">
            <label for="date">Session date</label>
            <input id="date" type="date" />
          </div>
          <div id="clientWrap" class="col hidden" style="min-width: 200px;">
            <label for="clientName">Client</label>
            <select id="clientName">
              <option value="">All clients</option>
            </select>
          </div>
          <div class="col">
            <button id="loadRows" type="button">Load bookings</button>
          </div>
        </div>
        <div id="status" class="status muted"></div>
      </section>

      <section class="card" id="eventActionsCard">
        <div class="row" style="align-items: end;">
          <div class="col">
            <label>Late-access link</label>
            <button id="rotateLateAccess" type="button">Rotate late-access</button>
          </div>
          <div class="col" style="flex: 1 1 300px;">
            <div id="lateAccessInfo" class="small muted">Select an event to generate late-access URL.</div>
          </div>
        </div>
      </section>

      <section class="card">
        <input class="search-bar" id="searchInput" type="search" placeholder="Search client, email, notes…" />
        <table>
          <thead>
            <tr>
              <th>Type</th>
              <th>When</th>
              <th>Client</th>
              <th>Email</th>
              <th>Status</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="rowsBody"></tbody>
        </table>
      </section>
      </main>
    </div>

    <div id="editOverlay" class="overlay hidden" aria-hidden="true">
      <div class="card modal" role="dialog" aria-modal="true" aria-labelledby="editTitle">
        <h1 id="editTitle" style="font-size: 1.2rem; margin-bottom: 8px;">Edit booking</h1>
        <table class="details-grid" id="editReadonlyDetails" aria-label="Booking details"></table>
        <div class="row">
          <div class="col" style="flex: 1 1 200px;">
            <label for="editFirstName">First name</label>
            <input id="editFirstName" />
          </div>
          <div class="col" style="flex: 1 1 200px;">
            <label for="editLastName">Last name</label>
            <input id="editLastName" />
          </div>
        </div>

        <div class="row" style="margin-top: 10px;">
          <div class="col" style="flex: 1 1 260px;">
            <label for="editEmail">Email</label>
            <input id="editEmail" type="email" />
          </div>
          <div class="col" style="flex: 1 1 220px;">
            <label for="editPhone">Phone</label>
            <input id="editPhone" />
          </div>
        </div>

        <div class="row" style="margin-top: 10px;">
          <div class="col" style="flex: 1 1 220px;">
            <label for="editStatus">Booking status</label>
            <select id="editStatus">
              <option value="PENDING">PENDING</option>
              <option value="CONFIRMED">CONFIRMED</option>
              <option value="EXPIRED">EXPIRED</option>
              <option value="CANCELED">CANCELED</option>
              <option value="COMPLETED">COMPLETED</option>
              <option value="NO_SHOW">NO_SHOW</option>
            </select>
          </div>
        </div>

        <div class="row" style="margin-top: 10px;">
          <div class="col" style="flex: 1 1 320px;">
            <label for="editNotes">Notes</label>
            <textarea id="editNotes"></textarea>
          </div>
        </div>

        <div id="editMsg" class="status muted"></div>

        <div class="btnrow" style="margin-top: 10px;">
          <button id="editOpenManage" type="button" class="secondary">Manage booking</button>
          <button id="editCopyClientManage" type="button" class="secondary">Copy client manage link</button>
          <button id="editClose" type="button" class="secondary">Close</button>
          <button id="editSave" type="button">Save</button>
        </div>
      </div>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/api-base.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/client.js"></script>
    <script src="js/pages/index.js"></script>
  </body>
</html>
