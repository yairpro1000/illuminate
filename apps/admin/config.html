<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ILLUMINATE Admin — Config</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>if(localStorage.getItem('yb-theme')==='light')document.documentElement.classList.add('theme-light');</script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

      :root {
        --color-bg:           oklch(11%  0.022 210);
        --color-bg-alt:       oklch(14%  0.025 208);
        --color-bg-card:      oklch(17%  0.030 207);
        --color-lake-deep:    oklch(44%  0.155 204);
        --color-lake:         oklch(59%  0.160 200);
        --color-lake-lt:      oklch(73%  0.130 195);
        --color-lake-mist:    oklch(59%  0.160 200 / 0.14);
        --color-text:         oklch(91%  0.015 200);
        --color-text-muted:   oklch(65%  0.020 207);
        --color-text-subtle:  oklch(48%  0.018 210);
        --color-border:       oklch(59%  0.160 200 / 0.18);
        --color-border-hover: oklch(59%  0.160 200 / 0.42);
        --color-ok:           oklch(75%  0.14 145);
        --color-danger:       oklch(72%  0.18 25);
        --radius-sm: 0.375rem;
        --radius-md: 0.75rem;
        --admin-sidebar-w: 15rem;
        --admin-header-h:  3.5rem;
        --admin-content-p: 1.5rem;
        --font: 'Inter', system-ui, -apple-system, sans-serif;
      }

      html.theme-light {
        --color-bg:           oklch(97% 0.006 210);
        --color-bg-alt:       oklch(93% 0.008 210);
        --color-bg-card:      oklch(100% 0 0);
        --color-text:         oklch(15% 0.025 210);
        --color-text-muted:   oklch(40% 0.020 207);
        --color-text-subtle:  oklch(55% 0.018 210);
        --color-border:       oklch(44% 0.155 204 / 0.20);
        --color-border-hover: oklch(44% 0.155 204 / 0.45);
        --color-ok:           oklch(35% 0.14 145);
        --color-danger:       oklch(45% 0.18 25);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--font);
        background:
          radial-gradient(circle at top right, oklch(59% 0.16 200 / 0.12), transparent 22rem),
          linear-gradient(180deg, var(--color-bg-alt), var(--color-bg));
        color: var(--color-text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.6;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.82rem;
      }

      .admin-shell {
        display: grid;
        grid-template-columns: var(--admin-sidebar-w) 1fr;
        grid-template-rows: var(--admin-header-h) 1fr;
        min-height: 100dvh;
      }

      .admin-header {
        grid-column: 1 / -1;
        background: var(--color-bg-alt);
        border-bottom: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        padding-inline: 1rem;
        gap: 1rem;
      }

      .admin-header__logo {
        font-weight: 700;
        font-size: 0.95rem;
        letter-spacing: 0.05em;
        color: var(--color-lake-lt);
      }

      .admin-header__spacer { flex: 1; }

      .theme-toggle {
        background: transparent;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        color: var(--color-text-muted);
        padding: 0.25rem 0.625rem;
        font-family: var(--font);
        font-size: 0.8125rem;
        font-weight: 400;
        cursor: pointer;
        line-height: 1.5;
      }

      .theme-toggle:hover {
        border-color: var(--color-border-hover);
        color: var(--color-text);
      }

      .admin-sidebar {
        background: var(--color-bg-alt);
        border-right: 1px solid var(--color-border);
        padding: 1rem 0;
        overflow-y: auto;
      }

      .admin-nav { display: flex; flex-direction: column; }

      .admin-nav-link {
        display: flex;
        align-items: center;
        padding: 0.5rem 1rem;
        color: var(--color-text-muted);
        font-size: 0.875rem;
        font-weight: 500;
        border-left: 2px solid transparent;
        text-decoration: none;
      }

      .admin-nav-link:hover {
        color: var(--color-text);
        background: var(--color-lake-mist);
      }

      .admin-nav-link.active {
        color: var(--color-lake-lt);
        border-left-color: var(--color-lake);
        background: var(--color-lake-mist);
      }

      .admin-content {
        padding: var(--admin-content-p);
        overflow-y: auto;
      }

      .card {
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: 1.25rem;
        margin-bottom: 0.75rem;
        box-shadow: 0 0.75rem 2rem oklch(0% 0 0 / 0.12);
      }

      h1 {
        margin: 0 0 0.375rem;
        font-size: 1.25rem;
        font-weight: 600;
      }

      .muted { color: var(--color-text-muted); font-size: 0.875rem; }
      .status { margin-top: 0.75rem; min-height: 1.4em; font-size: 0.875rem; }
      .ok { color: var(--color-ok); }
      .err { color: var(--color-danger); white-space: pre-wrap; }
      .hidden { display: none !important; }

      .page-actions {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 0.75rem;
      }

      .row {
        display: flex;
        gap: 0.625rem;
        flex-wrap: wrap;
        align-items: flex-end;
      }

      .col {
        display: flex;
        flex-direction: column;
      }

      .search-bar {
        width: 100%;
        max-width: 340px;
      }

      .config-path {
        margin-top: 1rem;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.55rem 0.8rem;
        border-radius: 999px;
        background: var(--color-lake-mist);
        border: 1px solid var(--color-border);
        color: var(--color-text);
      }

      .config-path__label {
        color: var(--color-text-subtle);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .tab-bar {
        display: flex;
        gap: 0.25rem;
        margin-bottom: 0.75rem;
      }

      .tab-btn {
        appearance: none;
        border: 1px solid var(--color-border);
        border-radius: 999px;
        background: transparent;
        color: var(--color-text-muted);
        padding: 0.55rem 0.95rem;
        font: inherit;
        font-size: 0.875rem;
        font-weight: 600;
      }

      .tab-btn.active {
        background: var(--color-lake-mist);
        border-color: var(--color-border-hover);
        color: var(--color-lake-lt);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
        table-layout: fixed;
      }

      th {
        text-align: left;
        padding: 0.625rem 0.75rem;
        color: var(--color-text-subtle);
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border-bottom: 1px solid var(--color-border);
      }

      td {
        padding: 0.875rem 0.75rem;
        color: var(--color-text);
        border-bottom: 1px solid var(--color-border);
        vertical-align: top;
      }

      tbody tr:hover td {
        background: var(--color-lake-mist);
      }

      tbody tr.clickable {
        cursor: pointer;
      }

      .col-domain { width: 16%; }
      .col-name { width: 30%; }
      .col-value { width: 12%; }
      .col-description { width: 42%; }

      .value-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 3rem;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        border: 1px solid var(--color-border);
        background: var(--color-bg-alt);
      }

      .empty-state {
        padding: 1rem 0;
        color: var(--color-text-muted);
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: oklch(0% 0 0 / 0.65);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .modal {
        width: min(820px, 96vw);
        max-height: min(92vh, 900px);
        overflow: auto;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.75rem;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .field--full {
        grid-column: 1 / -1;
      }

      label {
        color: var(--color-text-subtle);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--color-border);
        background: var(--color-bg-alt);
        color: var(--color-text);
        border-radius: var(--radius-sm);
        padding: 0.75rem 0.85rem;
      }

      textarea {
        min-height: 6.5rem;
        resize: vertical;
      }

      button {
        border: 1px solid var(--color-border);
        border-radius: 999px;
        background: var(--color-lake-mist);
        color: var(--color-text);
        padding: 0.65rem 1rem;
        cursor: pointer;
      }

      button.secondary {
        background: transparent;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .btn-row {
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
        margin-top: 0.85rem;
      }

      @media (max-width: 820px) {
        .admin-shell {
          grid-template-columns: 1fr;
          grid-template-rows: var(--admin-header-h) auto 1fr;
        }

        .admin-sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--color-border);
        }

        table, thead, tbody, tr, th, td { display: block; }
        thead { display: none; }
        tbody tr {
          border-bottom: 1px solid var(--color-border);
          padding: 0.4rem 0;
        }
        td {
          border-bottom: 0;
          padding: 0.35rem 0;
        }
        td::before {
          content: attr(data-label);
          display: block;
          color: var(--color-text-subtle);
          font-size: 0.72rem;
          text-transform: uppercase;
          letter-spacing: 0.08em;
          margin-bottom: 0.2rem;
        }

        .field-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="admin-shell">
      <header class="admin-header">
        <span class="admin-header__logo">Admin</span>
        <span class="admin-header__spacer"></span>
        <button class="theme-toggle" id="admin-logout-button" type="button" title="Log out of Cloudflare Access and reopen the sign-in options">Logout</button>
        <button class="theme-toggle" id="themeToggle" type="button" title="Toggle light/dark mode">Light</button>
      </header>
      <nav class="admin-sidebar">
        <div class="admin-nav">
          <a href="index.html" class="admin-nav-link" data-page="index">Bookings</a>
          <a href="clients.html" class="admin-nav-link" data-page="clients">Clients</a>
          <a href="session-types.html" class="admin-nav-link" data-page="session-types">Edit Offers</a>
          <a href="contact-messages.html" class="admin-nav-link" data-page="contact-messages">Contact Messages</a>
          <a href="config.html" class="admin-nav-link" data-page="config">Config</a>
        </div>
      </nav>
      <main class="admin-content">
        <section class="card">
          <h1>Config</h1>
          <p class="muted">Editable system settings for timing and delay behavior used by the booking backend.</p>
          <div class="config-path">
            <span class="config-path__label">Source</span>
            <code id="configPath">Loading…</code>
          </div>
          <div id="status" class="status muted">Loading…</div>
        </section>

        <div class="tab-bar" aria-label="Config sections">
          <button class="tab-btn active" type="button" data-tab="timing-delays" aria-current="page">Timing &amp; Delays</button>
        </div>

        <section class="card">
          <div class="page-actions">
            <button id="addSettingBtn" type="button">Add setting</button>
          </div>
          <div class="row" style="margin-bottom: 0.875rem;">
            <div class="col" style="min-width: 220px;">
              <label for="domainFilter">Domain</label>
              <select id="domainFilter">
                <option value="">All domains</option>
              </select>
            </div>
            <div class="col" style="flex: 1 1 320px;">
              <label for="searchInput">Search</label>
              <input id="searchInput" class="search-bar" type="search" placeholder="Search domain, name, key, value, description…" />
            </div>
          </div>
          <table aria-label="Timing and delay configuration">
            <thead>
              <tr>
                <th class="col-domain">Domain</th>
                <th class="col-name">Name</th>
                <th class="col-value">Value</th>
                <th class="col-description">Description</th>
              </tr>
            </thead>
            <tbody id="timingBody"></tbody>
          </table>
        </section>
      </main>
    </div>

    <div id="editOverlay" class="overlay hidden" aria-hidden="true">
      <div class="card modal" role="dialog" aria-modal="true" aria-labelledby="editTitle">
        <h1 id="editTitle">Edit setting</h1>
        <div class="field-grid" style="margin-top: 0.9rem;">
          <div class="field">
            <label for="editDomainSelect">Domain</label>
            <select id="editDomainSelect"></select>
          </div>
          <div class="field hidden" id="editDomainCustomWrap">
            <label for="editDomainCustom">New domain</label>
            <input id="editDomainCustom" type="text" />
          </div>
          <div class="field">
            <label for="editKeyname">Keyname</label>
            <input id="editKeyname" type="text" />
          </div>
          <div class="field">
            <label for="editReadableName">Readable name</label>
            <input id="editReadableName" type="text" />
          </div>
          <div class="field">
            <label for="editValueType">Value type</label>
            <select id="editValueType"></select>
          </div>
          <div class="field">
            <label for="editUnit">Unit</label>
            <input id="editUnit" type="text" />
          </div>
          <div class="field field--full">
            <label for="editValue">Value</label>
            <textarea id="editValue"></textarea>
          </div>
          <div class="field field--full">
            <label for="editDescription">Description (EN)</label>
            <textarea id="editDescription"></textarea>
          </div>
          <div class="field field--full">
            <label for="editDescriptionHe">Description (HE)</label>
            <textarea id="editDescriptionHe"></textarea>
          </div>
        </div>
        <div id="editMsg" class="status muted"></div>
        <div class="btn-row">
          <button id="editClose" type="button" class="secondary">Close</button>
          <button id="editSave" type="button">Save</button>
        </div>
      </div>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/api-base.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/client.js"></script>
    <script src="js/pages/config.js"></script>
  </body>
</html>
