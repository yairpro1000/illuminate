<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ILLUMINATE Admin — Provider Config</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        --bg: #f7f6f2;
        --card: #ffffff;
        --ink: #1f2937;
        --muted: #6b7280;
        --line: #d1d5db;
        --accent: #0d9488;
        --accent-bg: #f0fdfa;
        --danger: #b91c1c;
        --warn: #92400e;
        --warn-bg: #fffbeb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Segoe UI", Tahoma, sans-serif;
      }
      main {
        width: min(860px, 96vw);
        margin: 22px auto 44px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 18px 20px;
        margin-bottom: 10px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 1.4rem;
      }
      .muted { color: var(--muted); font-size: 0.88rem; }
      .ok    { color: #047857; }
      .err   { color: var(--danger); white-space: pre-wrap; }
      .status { margin-top: 8px; min-height: 1.2em; font-size: 0.88rem; }

      /* service grid */
      .services { display: flex; flex-direction: column; gap: 10px; }
      .service-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px 18px;
        display: grid;
        grid-template-columns: 110px 1fr auto;
        align-items: center;
        gap: 12px;
      }
      .service-label {
        font-weight: 600;
        font-size: 0.95rem;
      }
      .service-sub {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 2px;
      }
      .modes {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .mode-btn {
        font: inherit;
        font-size: 0.82rem;
        padding: 5px 13px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        transition: background 0.12s, border-color 0.12s, color 0.12s;
        white-space: nowrap;
      }
      .mode-btn:hover:not(:disabled):not(.active) {
        border-color: var(--accent);
        color: var(--accent);
      }
      .mode-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: default;
      }
      .mode-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .badge {
        font-size: 0.72rem;
        padding: 2px 8px;
        border-radius: 20px;
        font-weight: 600;
        white-space: nowrap;
      }
      .badge-override {
        background: var(--warn-bg);
        color: var(--warn);
        border: 1px solid #fde68a;
      }
      .badge-env {
        background: #f3f4f6;
        color: var(--muted);
        border: 1px solid var(--line);
      }
      .badge-real {
        background: var(--accent-bg);
        color: var(--accent);
        border: 1px solid #99f6e4;
      }
      .badge-stub {
        background: #f3f4f6;
        color: #9ca3af;
        border: 1px solid var(--line);
        font-style: italic;
      }

      @media (max-width: 600px) {
        .service-card {
          grid-template-columns: 1fr;
          gap: 8px;
        }
      }
      /* admin sidebar layout */
      .admin-layout { display: flex; min-height: 100vh; }
      .admin-sidebar {
        flex: 0 0 180px;
        width: 180px;
        background: var(--card);
        border-right: 1px solid var(--line);
        padding: 16px 10px;
        position: sticky;
        top: 0;
        height: 100vh;
      }
      .admin-logo { font-weight: 700; margin: 2px 0 10px; font-size: 0.95rem; color: var(--muted); }
      .admin-nav { display: flex; flex-direction: column; gap: 4px; }
      .admin-nav-link { display: block; padding: 7px 10px; border-radius: 8px; color: inherit; text-decoration: none; }
      .admin-nav-link:hover { background: #f3f4f6; }
      .admin-nav-link.active { background: var(--accent); color: #fff; }
      .admin-content { flex: 1; min-width: 0; }
    </style>
  </head>
  <body>
    <div class="admin-layout">
      <nav class="admin-sidebar">
        <div class="admin-logo">Admin</div>
        <div class="admin-nav">
          <a href="index.html" class="admin-nav-link" data-page="index">Bookings</a>
          <a href="session-types.html" class="admin-nav-link" data-page="session-types">Session Types</a>
          <a href="contact-messages.html" class="admin-nav-link" data-page="contact-messages">Contact Messages</a>
        </div>
      </nav>
      <main class="admin-content">
      <section class="card">
        <h1>Provider Config</h1>
        <p class="muted">
          Runtime overrides reset on server cold start. Set env vars in
          <code>wrangler.toml</code> for persistent defaults.<br />
          API: <code id="apiBaseLabel"></code>
        </p>
        <div id="status" class="status muted">Loading…</div>
      </section>

      <div id="services" class="services"></div>
      </main>
    </div>

    <script>
      // highlight active nav link
      (function(){
        var page = (location.pathname.split('/').pop() || 'index.html');
        if (page === '' || page === '/') page = 'index.html';
        var map = { 'index.html': 'index', 'session-types.html': 'session-types', 'contact-messages.html': 'contact-messages' };
        var key = map[page] || 'index';
        var el = document.querySelector('.admin-nav-link[data-page="'+key+'"]');
        if (el) el.classList.add('active');
      })();
    </script>
    <script src="js/api-base.js"></script>
    <script src="js/admin-auth.js"></script>
    <script>
      (function () {
        const apiBase = window.getAdminApiBase();

        document.getElementById("apiBaseLabel").textContent = apiBase;

        function resolveUrl(path) { return window.resolveAdminUrl(path); }

        function buildRequestInit(init) {
          const next = {
            method: "GET",
            credentials: "include",
            ...init,
          };
          const headers = new Headers(init && init.headers ? init.headers : undefined);
          if (next.body != null && !headers.has("Content-Type")) {
            headers.set("Content-Type", "text/plain;charset=UTF-8");
          }
          next.headers = headers;
          return next;
        }

        async function api(path, init) {
          const res = await fetch(resolveUrl(path), buildRequestInit(init));
          if (res.status === 401 && window.adminAuth) {
            try { window.adminAuth.handleUnauthorized(401); } catch (_) {}
          }
          const text = await res.text();
          let body = {};
          try { body = text ? JSON.parse(text) : {}; } catch { body = { raw: text }; }
          if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${JSON.stringify(body)}`);
          return body;
        }

        function setStatus(text, type) {
          const el = document.getElementById("status");
          el.className = `status ${type || "muted"}`;
          el.textContent = text || "";
        }

        function sourceBadge(svc) {
          const wiredModes = svc.modes.filter((m) => m.wired);
          const mockOnly = wiredModes.length === 1 && wiredModes[0].value === "mock";
          if (mockOnly) {
            return `<span class="badge badge-stub">mock only — not yet wired</span>`;
          }
          if (svc.override_mode) {
            return `<span class="badge badge-override">runtime override</span>`;
          }
          if (svc.effective_mode !== "mock") {
            return `<span class="badge badge-real">live</span>`;
          }
          return `<span class="badge badge-env">env default</span>`;
        }

        function renderService(svc) {
          const card = document.createElement("div");
          card.className = "service-card";
          card.dataset.key = svc.key;

          const info = document.createElement("div");
          info.innerHTML = `
            <div class="service-label">${svc.label}</div>
            <div class="service-sub">env: <code>${svc.env_mode}</code></div>
          `;

          const modesEl = document.createElement("div");
          modesEl.className = "modes";

          for (const mode of svc.modes) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.textContent = mode.label;
            btn.className = "mode-btn" + (mode.value === svc.effective_mode ? " active" : "");
            btn.disabled = !mode.wired || mode.value === svc.effective_mode;
            if (!mode.wired) btn.title = "Not yet wired — implementation pending";
            btn.addEventListener("click", () => patchMode(svc.key, mode.value));
            modesEl.appendChild(btn);
          }

          const badgeEl = document.createElement("div");
          badgeEl.innerHTML = sourceBadge(svc);

          card.appendChild(info);
          card.appendChild(modesEl);
          card.appendChild(badgeEl);
          return card;
        }

        function renderAll(services) {
          const container = document.getElementById("services");
          container.innerHTML = "";
          for (const svc of services) {
            container.appendChild(renderService(svc));
          }
        }

        async function load() {
          try {
            const data = await api("/admin/config");
            renderAll(data.services);
            setStatus("Ready.", "ok");
          } catch (err) {
            setStatus(String(err), "err");
          }
        }

        async function patchMode(key, mode) {
          setStatus("Saving…", "muted");
          try {
            await api("/admin/config", {
              method: "POST",
              body: JSON.stringify({ key, mode }),
            });
            await load();
          } catch (err) {
            setStatus(String(err), "err");
          }
        }

        load();
      })();
    </script>
  </body>
</html>
