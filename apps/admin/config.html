<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ILLUMINATE Admin — Provider Config</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        --bg: #f7f6f2;
        --card: #ffffff;
        --ink: #1f2937;
        --muted: #6b7280;
        --line: #d1d5db;
        --accent: #0d9488;
        --accent-bg: #f0fdfa;
        --danger: #b91c1c;
        --warn: #92400e;
        --warn-bg: #fffbeb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Segoe UI", Tahoma, sans-serif;
      }
      main {
        width: min(860px, 96vw);
        margin: 22px auto 44px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 18px 20px;
        margin-bottom: 10px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 1.4rem;
      }
      .muted { color: var(--muted); font-size: 0.88rem; }
      .ok    { color: #047857; }
      .err   { color: var(--danger); white-space: pre-wrap; }
      .status { margin-top: 8px; min-height: 1.2em; font-size: 0.88rem; }

      /* service grid */
      .services { display: flex; flex-direction: column; gap: 10px; }
      .service-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px 18px;
        display: grid;
        grid-template-columns: 110px 1fr auto;
        align-items: center;
        gap: 12px;
      }
      .service-label {
        font-weight: 600;
        font-size: 0.95rem;
      }
      .service-sub {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 2px;
      }
      .modes {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .mode-btn {
        font: inherit;
        font-size: 0.82rem;
        padding: 5px 13px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        transition: background 0.12s, border-color 0.12s, color 0.12s;
        white-space: nowrap;
      }
      .mode-btn:hover:not(:disabled):not(.active) {
        border-color: var(--accent);
        color: var(--accent);
      }
      .mode-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: default;
      }
      .mode-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .badge {
        font-size: 0.72rem;
        padding: 2px 8px;
        border-radius: 20px;
        font-weight: 600;
        white-space: nowrap;
      }
      .badge-override {
        background: var(--warn-bg);
        color: var(--warn);
        border: 1px solid #fde68a;
      }
      .badge-env {
        background: #f3f4f6;
        color: var(--muted);
        border: 1px solid var(--line);
      }
      .badge-real {
        background: var(--accent-bg);
        color: var(--accent);
        border: 1px solid #99f6e4;
      }
      .badge-stub {
        background: #f3f4f6;
        color: #9ca3af;
        border: 1px solid var(--line);
        font-style: italic;
      }

      @media (max-width: 600px) {
        .service-card {
          grid-template-columns: 1fr;
          gap: 8px;
        }
      }
      /* admin sidebar layout */
      .admin-layout { display: flex; min-height: 100vh; }
      .admin-sidebar {
        flex: 0 0 180px;
        width: 180px;
        background: var(--card);
        border-right: 1px solid var(--line);
        padding: 16px 10px;
        position: sticky;
        top: 0;
        height: 100vh;
      }
      .admin-logo { font-weight: 700; margin: 2px 0 10px; font-size: 0.95rem; color: var(--muted); }
      .admin-nav { display: flex; flex-direction: column; gap: 4px; }
      .admin-nav-link { display: block; padding: 7px 10px; border-radius: 8px; color: inherit; text-decoration: none; }
      .admin-nav-link:hover { background: #f3f4f6; }
      .admin-nav-link.active { background: var(--accent); color: #fff; }
      .admin-content { flex: 1; min-width: 0; }
    </style>
  </head>
  <body>
    <div class="admin-layout">
      <nav class="admin-sidebar">
        <div class="admin-logo">Admin</div>
        <div class="admin-nav">
          <a href="index.html" class="admin-nav-link" data-page="index">Bookings</a>
          <a href="session-types.html" class="admin-nav-link" data-page="session-types">Session Types</a>
          <a href="contact-messages.html" class="admin-nav-link" data-page="contact-messages">Contact Messages</a>
        </div>
      </nav>
      <main class="admin-content">
      <section class="card">
        <h1>Provider Config</h1>
        <p class="muted">
          Runtime overrides reset on server cold start. Set env vars in
          <code>wrangler.toml</code> for persistent defaults.<br />
          API: <code id="apiBaseLabel"></code>
        </p>
        <div id="status" class="status muted">Loading…</div>
      </section>

      <div id="services" class="services"></div>
      </main>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/api-base.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/client.js"></script>
    <script src="js/pages/config.js"></script>
  </body>
</html>
